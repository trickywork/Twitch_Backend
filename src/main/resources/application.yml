logging:
  level:
    org.apache.coyote.http11.Http11InputBuffer: TRACE # Incoming HTTP requests
    twitch.external.TwitchApiClient: DEBUG
#spring.application.name=twitch
#print out specific http request


#eliminate null in json
spring:
  jackson:
    default-property-inclusion: non_null
    property-naming-strategy: SNAKE_CASE
  cloud:
    openfeign:
      oauth2:
        enabled: true
        clientRegistrationId: twitch
      client:
        config:
          twitch-api:
            url: https://api.twitch.tv/helix
            loggerLevel: basic
            default-request-headers:
              Client-Id: "7jd01st4qek5mqblv5w3azpwgl86h3"

  security:
    oauth2:
      client:
        registration:
          twitch:
            authorization-grant-type: client_credentials
            client-authentication-method: client_secret_post
            client-id: "7jd01st4qek5mqblv5w3azpwgl86h3"
            client-secret: "xwmvydxc4r127sic6fa0qgxi9jo0c8"
        provider:
          twitch:
            token-uri: https://id.twitch.tv/oauth2/token
