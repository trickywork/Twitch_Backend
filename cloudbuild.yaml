steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/portfolio/twitch-api:$COMMIT_SHA
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/portfolio/twitch-api:$COMMIT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - twitch-api
      - --image
      - us-central1-docker.pkg.dev/$PROJECT_ID/portfolio/twitch-api:$COMMIT_SHA
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated
      - --min-instances
      - "0"
      - --max-instances
      - "1"
      - --memory
      - 512Mi
      - --cpu
      - "1"
      - --set-env-vars
      - TWITCH_DEMO_MODE=true
images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/portfolio/twitch-api:$COMMIT_SHA
